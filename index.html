<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脳トレ高速アプリ</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:linear-gradient(180deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.app{
    background:white;
    width:95%;
    max-width:400px;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}
#question{
    font-size:30px;
    margin:20px 0;
}
input{
    font-size:22px;
    padding:8px;
    width:120px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ccc;
}
button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:12px;
    background:#4facfe;
    color:white;
}
.stats{
    margin-top:15px;
    font-size:14px;
}
.ranking{
    margin-top:15px;
    text-align:left;
}
</style>
</head>
<body>

<div class="app">
    <h1>🧠 脳トレ</h1>
    <div id="question">スタートを押してください</div>
    <input type="number" id="answer" disabled>
    <br>
    <button onclick="startGame()">スタート</button>

    <div class="stats">
        ⏱ <span id="time">30</span>秒  
        ⭐ スコア: <span id="score">0</span>  
        🚀 Lv.<span id="level">1</span>
    </div>

    <div class="ranking">
        <h3>🏆 ランキング TOP5</h3>
        <ol id="rankingList"></ol>
    </div>
</div>

<script>
let score=0,time=30,level=1,timer,correct;
let audioCtx=null;

// 🔊 音を鳴らすヘルパー
function createTone(freq, duration, startTime){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type="sine";
    osc.frequency.value=freq;

    gain.gain.setValueAtTime(0.25, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime+duration);

    osc.start(startTime);
    osc.stop(startTime+duration);
}

// 🎵 効果音
function playCorrect(){
    const now = audioCtx.currentTime;
    createTone(1000,0.12,now);        // ピン
    createTone(1400,0.15,now+0.13);   // ポン
}

function playWrong(){
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type="sawtooth";
    osc.frequency.setValueAtTime(250,now);
    osc.frequency.exponentialRampToValueAtTime(120,now+0.4);

    gain.gain.setValueAtTime(0.3,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.4);

    osc.start(now);
    osc.stop(now+0.4);
}

function playEnd(){
    const now = audioCtx.currentTime;
    createTone(600,0.15,now);
    createTone(800,0.15,now+0.15);
    createTone(1000,0.2,now+0.3);
}

function updateDisplay(){
    document.getElementById("score").innerText=score;
    document.getElementById("level").innerText=level;
    document.getElementById("time").innerText=time;
}

function generate(){
    let max=level*10;
    let a=Math.floor(Math.random()*max)+1;
    let b=Math.floor(Math.random()*max)+1;

    if(Math.random()>0.5){
        correct=a+b;
        document.getElementById("question").innerText=`${a} + ${b} = ?`;
    }else{
        correct=a-b;
        document.getElementById("question").innerText=`${a} - ${b} = ?`;
    }
}

function startGame(){
    score=0; time=30; level=1;
    updateDisplay();

    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    document.getElementById("answer").disabled=false;
    document.getElementById("answer").focus();
    generate();

    clearInterval(timer);
    timer=setInterval(()=>{
        time--;
        updateDisplay();
        if(time<=0){
            clearInterval(timer);
            document.getElementById("question").innerText="終了！";
            document.getElementById("answer").disabled=true;
            playEnd();
            saveScore(score);
        }
    },1000);
}

document.getElementById("answer").addEventListener("keyup",e=>{
    if(e.key==="Enter"){
        if(Number(e.target.value)===correct){
            score++;
            if(score%5===0) level++;
            playCorrect();
        }else{
            playWrong();
        }
        e.target.value="";
        updateDisplay();
        generate();
    }
});

function saveScore(newScore){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.push(newScore);
    scores.sort((a,b)=>b-a);
    scores=scores.slice(0,5);
    localStorage.setItem("scores",JSON.stringify(scores));
    displayRanking();
}

function displayRanking(){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    let list=document.getElementById("rankingList");
    list.innerHTML="";
    scores.forEach(score=>{
        let li=document.createElement("li");
        li.innerText=score+" 点";
        list.appendChild(li);
    });
}

displayRanking();
</script>

</body>
</html>
